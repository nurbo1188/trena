<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        #chat-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; min-height: 100px; margin-bottom: 20px; background: #f9f9f9; }
        input { width: 80%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 10px 20px; border-radius: 4px; border: none; background: #0070f3; color: white; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <h1>AI Chatbot Demo</h1>
    <div id="chat-container">Жауап осында шығады...</div>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="user-input" placeholder="Сұрағыңызды жазыңыз...">
        <button id="send-btn">Жіберу</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
